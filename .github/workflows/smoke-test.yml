name: Smoke Test

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'URL base a testear (ej: https://sportspulse.onrender.com)'
        required: true
        type: string

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run smoke test
        run: pnpm smoke-test
        env:
          SMOKE_BASE_URL: ${{ inputs.base_url }}
